<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FIZUX"/>
<meta name="theme-color" content="#C9A84C"/>
<title>FIZUX — AI Universe</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#07070D;color:#E8E8F8;font-family:'DM Sans',system-ui,sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #root{width:100%;height:100vh;}
  .loader{text-align:center;}
  .logo{width:80px;height:80px;border-radius:28px;background:linear-gradient(135deg,#C9A84C,#E8C96B);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:36px;color:#1A1000;margin:0 auto 20px;box-shadow:0 8px 32px rgba(201,168,76,0.4);animation:float 2s ease-in-out infinite;}
  .title{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:8px;}
  .sub{font-size:13px;color:#7070A0;margin-bottom:24px;}
  .dots{display:flex;gap:8px;justify-content:center;}
  .dot{width:8px;height:8px;border-radius:50%;background:#C9A84C;animation:bounce 1.2s infinite;}
  .dot:nth-child(2){animation-delay:.2s;}
  .dot:nth-child(3){animation-delay:.4s;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes bounce{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-6px);opacity:1}}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="root">
  <div class="loader">
    <div class="logo">F</div>
    <div class="title">FIZUX</div>
    <div class="sub">Your Personal AI Universe</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script type="text/babel" src="app.js"></script>
</body>
</html>
