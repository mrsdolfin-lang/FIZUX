<style>
  :root {
    --bg: #0A0A0F;
    --surface: #111118;
    --card: #16161E;
    --card2: #1C1C26;
    --border: #2A2A3A;
    --borderLight: #363648;
    --text: #F0F0FF;
    --textSub: #A0A0C0;
    --textMuted: #606080;
    --textDim: #383850;
    --accent: #C9A84C;
    --accentSoft: rgba(201,168,76,0.12);
    --accentGlow: rgba(201,168,76,0.25);
    --purple: #8B6FE8;
    --blue: #4A9EFF;
    --green: #2ECC8A;
    --red: #FF4D6A;
    --orange: #FF8C42;
    --pink: #FF6B9D;
    --gradGold: linear-gradient(135deg,#C9A84C,#E8C96B);
    --gradPurple: linear-gradient(135deg,#6B4FD8,#8B6FE8);
    --gradBlue: linear-gradient(135deg,#2A7FE8,#4A9EFF);
    --gradGreen: linear-gradient(135deg,#1AAA6A,#2ECC8A);
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --shadowLg: 0 8px 48px rgba(0,0,0,0.6);
    --shadowGold: 0 4px 20px rgba(201,168,76,0.3);
    --radius: 16px;
    --radiusSm: 10px;
    --font: 'Plus Jakarta Sans', system-ui, sans-serif;
    --fontMono: 'DM Mono', monospace;
    --fontDisplay: 'Syne', system-ui, sans-serif;
    --fontSize: 14px;
  }
  [data-theme="light"] {
    --bg: #F8F8FC;
    --surface: #FFFFFF;
    --card: #FFFFFF;
    --card2: #F0F0F8;
    --border: #E0E0EE;
    --borderLight: #D0D0E0;
    --text: #0A0A1A;
    --textSub: #444460;
    --textMuted: #888890;
    --textDim: #C0C0CC;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadowLg: 0 8px 32px rgba(0,0,0,0.12);
    --accentSoft: rgba(201,168,76,0.10);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:var(--font); font-size:var(--fontSize); }
  #app { width:100%; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
  input, textarea, button { font-family:var(--font); }
  button { cursor:pointer; border:none; outline:none; }
  input, textarea { outline:none; border:none; }
  textarea { resize:none; }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:.5;transform:scale(0.95)} 50%{opacity:1;transform:scale(1.05)} }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes bounce { 0%,100%{transform:translateY(0);opacity:.4} 50%{transform:translateY(-6px);opacity:1} }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .fadeUp { animation:fadeUp 0.35s ease forwards; }
  .spinner { width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite; }
</style>
</head>
<body>
<div id="root">
  <div style="height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
    <div style="width:80px;height:80px;border-radius:24px;background:var(--gradGold);display:flex;align-items:center;justify-content:center;font-family:var(--fontDisplay);font-weight:800;font-size:36px;color:#1A1000;box-shadow:var(--shadowGold);animation:float 2s ease-in-out infinite;">F</div>
    <div style="font-family:var(--fontDisplay);font-size:28px;font-weight:800;letter-spacing:-1px;">FIZUX</div>
    <div style="font-size:13px;color:var(--textMuted);">Your Personal AI Universe</div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <div style="width:8px;height:8px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite;"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite;animation-delay:.2s;"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite;animation-delay:.4s;"></div>
    </div>
  </div>
</div>

<!-- Storage API -->
<script>
window.storage = {
  async get(key, shared) {
    try { const v = localStorage.getItem((shared?'sh_':'lc_')+key); if(v===null)throw new Error('nf'); return {key,value:v,shared:!!shared}; } catch(e){throw e;}
  },
  async set(key, value, shared) {
    try { localStorage.setItem((shared?'sh_':'lc_')+key, typeof value==='string'?value:JSON.stringify(value)); return {key,value,shared:!!shared}; } catch(e){return null;}
  },
  async delete(key, shared) {
    try { localStorage.removeItem((shared?'sh_':'lc_')+key); return {key,deleted:true}; } catch(e){return null;}
  },
  async list(prefix, shared) {
    try { const p=(shared?'sh_':'lc_')+prefix; const keys=Object.keys(localStorage).filter(k=>k.startsWith(p)).map(k=>k.replace(/^(sh_|lc_)/,'')); return {keys}; } catch(e){return {keys:[]};}
  }
};

// PWA
let _pwaPrompt = null;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); _pwaPrompt = e; window._pwa = e; });
if('serviceWorker' in navigator) window.addEventListener('load', ()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
