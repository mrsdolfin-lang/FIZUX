<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FIZUX"/>
<meta name="theme-color" content="#C9A84C"/>
<meta name="description" content="FIZUX — Your Personal AI Universe. 130+ AI Features, Claude, Gemini, DeepThink."/>
<title>FIZUX — Your Personal AI Universe</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<link rel="icon" type="image/png" href="icon.png"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#07070D;font-family:'DM Sans',system-ui,sans-serif;overflow:hidden;}
#root{width:100vw;height:100vh;}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

<div id="root">
  <div style="height:100vh;background:#07070D;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
    <div style="width:80px;height:80px;border-radius:28px;background:linear-gradient(135deg,#C9A84C,#E8C96B);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:36px;color:#1A1000;box-shadow:0 8px 32px rgba(201,168,76,0.4);animation:fl 2s ease-in-out infinite">F</div>
    <div style="font-size:26px;font-weight:900;color:#E8E8F8;letter-spacing:-1px;">FIZUX</div>
    <div style="font-size:13px;color:#7070A0;">Your Personal AI Universe</div>
    <div style="display:flex;gap:8px;">
      <div style="width:8px;height:8px;border-radius:50%;background:#C9A84C;animation:bn 1.2s infinite;"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:#C9A84C;animation:bn 1.2s infinite;animation-delay:.2s;"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:#C9A84C;animation:bn 1.2s infinite;animation-delay:.4s;"></div>
    </div>
  </div>
</div>

<style>
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes bn{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-6px);opacity:1}}
</style>

<!-- React 18 -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel Standalone for JSX -->
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<!-- File Libraries -->
<script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
// ── Storage API (localStorage wrapper) ──
window.storage = {
  async get(key, shared) {
    try {
      const k = (shared ? 'sh_' : 'lc_') + key;
      const v = localStorage.getItem(k);
      if (v === null) throw new Error('not found');
      return { key, value: v, shared: !!shared };
    } catch(e) { throw e; }
  },
  async set(key, value, shared) {
    try {
      const k = (shared ? 'sh_' : 'lc_') + key;
      localStorage.setItem(k, typeof value === 'string' ? value : JSON.stringify(value));
      return { key, value, shared: !!shared };
    } catch(e) { return null; }
  },
  async delete(key, shared) {
    try {
      const k = (shared ? 'sh_' : 'lc_') + key;
      localStorage.removeItem(k);
      return { key, deleted: true };
    } catch(e) { return null; }
  },
  async list(prefix, shared) {
    try {
      const p = (shared ? 'sh_' : 'lc_') + prefix;
      const keys = Object.keys(localStorage)
        .filter(k => k.startsWith(p))
        .map(k => k.replace(/^(sh_|lc_)/, ''));
      return { keys };
    } catch(e) { return { keys: [] }; }
  }
};

// ── PWA Install Handler ──
let _installPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _installPrompt = e;
  window._fizuxInstall = e;
});
window.addEventListener('appinstalled', () => {
  console.log('FIZUX PWA installed!');
  _installPrompt = null;
});

// ── Service Worker Registration ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW error:', err));
  });
}
</script>

<!-- FIZUX Main App -->
<script type="text/babel" src="./fizux-app.js"></script>

</body>
</html>
